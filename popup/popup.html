<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>InternShield</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="container">

        <div id="header">
            <div class="titleLogo">
                <div id="logo">
                    <img src="../images/logo.svg" id="logo"/>
                </div>
                <h1>InternShield</h1>
            </div>
            <div id="active-container">
                <h3 id="active-state-text" class="blue-activeText">ACTIVE</h3>
                <label class="switch">
                    <input type="checkbox" id="activeCheckBox" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div id="content">

            <div id="site-warning-overlay" class="hidden">
                <div id="centered-warning-message">
                    <span class="info-icon">i</span>
                    <div>
                        <span id="overlay-warning-reason">Extension Off!</span>
                    </div>
                </div>
            </div>

            <div id="extension-info">
                <h5><span id="blue-text">Active Protection:</span> Automatically hiding posts with blocked keywords</h5>
            </div>

            <div id="input-area">
                <svg fill="#000000" width="20px" height="20px" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M21.71,20.29,18,16.61A9,9,0,1,0,16.61,18l3.68,3.68a1,1,0,0,0,1.42,0A1,1,0,0,0,21.71,20.29ZM11,18a7,7,0,1,1,7-7A7,7,0,0,1,11,18Z"/></svg>
                <input type="text" placeholder="Block a keyword or a company.. " id="input-keyword"/>
                <button id="add-btn">+</button>
            </div>

            <div id="blocked-list">
                <div id="blocked-list-heading">
                    <h5>Blocked Terms</h5>
                    <h6 id="blocked-terms-count">0</h6>
                </div>
                <ul id="blocked-keywords">
                </ul>
            </div>

            <footer>
                <div class="Settings">
                    <img src="../images/settings.svg"/>
                    <span>Settings</span>
                </div>
                <span>v1.0.0</span>
            </footer>
        </div>
    </div>
</body>
<script src="popup.js"></script>
</html>
